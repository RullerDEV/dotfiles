[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = ["click", "scroll"]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 4
max_width       = 1920
max_height      = 1080
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 80
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = '$EDITOR "$@"', desc = "Edit", block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open", for = "linux" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal", for = "linux" },
]
extract = [
  { run = 'unar "$1"', desc = "Extract here", for = "unix" },
]
play = [
  { run = 'mpv --force-window "$@"', orphan = true, for = "unix" },
]
view-image = [
  { run = 'imv-folder "$@"', orphan = true, for = "linux" },
  { run = 'xdg-open "$@"', orphan = true, for = "linux" },
]
view-pdf = [
  { run = 'zathura "$@"', orphan = true, for = "linux" },
  { run = 'xdg-open "$@"', orphan = true, for = "linux" },
]
wallpaper = [
  { run = '~/.config/hypr/scripts/wallpaper.sh set "$1"', desc = "Set as wallpaper", for = "linux" },
]

[open]
rules = [
  { name = "*/", use = ["edit", "open", "reveal"] },
  { mime = "text/*",          use = ["edit", "reveal"] },
  { mime = "image/*",         use = ["view-image", "wallpaper", "reveal"] },
  { mime = "video/*",         use = ["play", "reveal"] },
  { mime = "audio/*",         use = ["play", "reveal"] },
  { mime = "application/pdf", use = ["view-pdf", "reveal"] },
  { mime = "application/zip",          use = ["extract", "reveal"] },
  { mime = "application/gzip",         use = ["extract", "reveal"] },
  { mime = "application/x-tar",        use = ["extract", "reveal"] },
  { mime = "application/x-bzip",       use = ["extract", "reveal"] },
  { mime = "application/x-bzip2",      use = ["extract", "reveal"] },
  { mime = "application/x-7z-compressed", use = ["extract", "reveal"] },
  { mime = "application/x-rar",        use = ["extract", "reveal"] },
  { mime = "application/xz",           use = ["extract", "reveal"] },
  { mime = "*",               use = ["open", "reveal"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912
image_bound      = [0, 0]
suppress_preload = false

[plugin]
prepend_fetchers = []
prepend_preloaders = []
prepend_previewers = []

[input]
cd_title    = "Change directory:"
create_title = ["Create:", "Create (dir):"]
rename_title = "Rename:"
trash_title = "Move {n} selected file{s} to trash? (y/N)"
delete_title = "Delete {n} selected file{s} permanently? (y/N)"
filter_title = "Filter:"
find_title   = ["Find next:", "Find previous:"]
search_title = "Search via {n}:"
shell_title  = ["Shell:", "Shell (block):"]

[confirm]
trash_title  = "Trash {n} files"
delete_title = "Delete {n} files"
overwrite_title = "Overwrite"
quit_title   = "Quit?"
