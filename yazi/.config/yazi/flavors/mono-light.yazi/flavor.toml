[mgr]
cwd = { fg = "#11100e", bold = true }

hovered         = { reversed = true }
preview_hovered = { underline = true }

find_keyword  = { fg = "#11100e", bold = true, italic = true, underline = true }
find_position = { fg = "#9b5c55", bg = "reset", italic = true }

marker_copied   = { fg = "#11100e", bg = "#11100e" }
marker_cut      = { fg = "#9b5c55", bg = "#9b5c55" }
marker_marked   = { fg = "#24231f", bg = "#24231f" }
marker_selected = { fg = "#7d766d", bg = "#7d766d" }

tab_active   = { fg = "#f4f1ea", bg = "#11100e", bold = true }
tab_inactive = { fg = "#7d766d", bg = "#e7e1d7" }
tab_width    = 1

count_copied   = { fg = "#f4f1ea", bg = "#11100e" }
count_cut      = { fg = "#f4f1ea", bg = "#9b5c55" }
count_selected = { fg = "#f4f1ea", bg = "#24231f" }

border_symbol = "│"
border_style  = { fg = "#d5ccbf" }

syntect_theme = ""

[mode]
normal_main = { fg = "#f4f1ea", bg = "#11100e", bold = true }
normal_alt  = { fg = "#11100e", bg = "#e7e1d7" }

select_main = { fg = "#f4f1ea", bg = "#24231f", bold = true }
select_alt  = { fg = "#24231f", bg = "#e7e1d7" }

unset_main = { fg = "#f4f1ea", bg = "#7d766d", bold = true }
unset_alt  = { fg = "#7d766d", bg = "#e7e1d7" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#e7e1d7", bg = "#e7e1d7" }

progress_label  = { fg = "#11100e", bold = true }
progress_normal = { fg = "#11100e", bg = "#e7e1d7" }
progress_error  = { fg = "#9b5c55", bg = "#e7e1d7" }

permissions_t = { fg = "#11100e" }
permissions_r = { fg = "#24231f" }
permissions_w = { fg = "#9b5c55" }
permissions_x = { fg = "#11100e" }
permissions_s = { fg = "#7d766d" }

[input]
border   = { fg = "#11100e" }
title    = {}
value    = {}
selected = { reversed = true }

[completion]
border   = { fg = "#11100e" }
active   = { reversed = true }
inactive = {}

[tasks]
border  = { fg = "#11100e" }
title   = {}
hovered = { underline = true }

[which]
mask         = { bg = "#e7e1d7" }
cand         = { fg = "#24231f" }
rest         = { fg = "#7d766d" }
desc         = { fg = "#11100e" }
separator    = "  "
separator_style = { fg = "#d5ccbf" }

[help]
on      = { fg = "#11100e" }
run     = { fg = "#24231f" }
desc    = { fg = "#7d766d" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#f4f1ea", bg = "#11100e" }

[notify]
title_info  = { fg = "#11100e" }
title_warn  = { fg = "#9b5c55" }
title_error = { fg = "#9b5c55" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[filetype]
rules = [
  { mime = "image/*",   fg = "#11100e" },
  { mime = "video/*",   fg = "#24231f" },
  { mime = "audio/*",   fg = "#9b5c55" },
  { mime = "application/zip",          fg = "#7d766d" },
  { mime = "application/gzip",         fg = "#7d766d" },
  { mime = "application/x-tar",        fg = "#7d766d" },
  { mime = "application/x-bzip",       fg = "#7d766d" },
  { mime = "application/x-bzip2",      fg = "#7d766d" },
  { mime = "application/x-7z-compressed", fg = "#7d766d" },
  { mime = "application/x-rar",        fg = "#7d766d" },
  { mime = "application/pdf",          fg = "#11100e" },
  { name = "*",  fg = "#24231f" },
  { name = "*/", fg = "#11100e", bold = true },
]

[icon]
prepend_rules = [
  { name  = ".git",          text = "" },
  { name  = "Downloads",     text = "" },
  { name  = "Documents",     text = "" },
  { name  = "Pictures",      text = "" },
  { name  = "Music",         text = "" },
  { name  = "Videos",        text = "" },
]
