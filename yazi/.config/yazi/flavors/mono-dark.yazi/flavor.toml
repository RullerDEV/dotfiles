[mgr]
cwd = { fg = "#fbfaf6", bold = true }

hovered         = { reversed = true }
preview_hovered = { underline = true }

find_keyword  = { fg = "#fbfaf6", bold = true, italic = true, underline = true }
find_position = { fg = "#c47b6f", bg = "reset", italic = true }

marker_copied   = { fg = "#fbfaf6", bg = "#fbfaf6" }
marker_cut      = { fg = "#c47b6f", bg = "#c47b6f" }
marker_marked   = { fg = "#e9e4d8", bg = "#e9e4d8" }
marker_selected = { fg = "#8f9688", bg = "#8f9688" }

tab_active   = { fg = "#0f1110", bg = "#fbfaf6", bold = true }
tab_inactive = { fg = "#8f9688", bg = "#242925" }
tab_width    = 1

count_copied   = { fg = "#0f1110", bg = "#fbfaf6" }
count_cut      = { fg = "#0f1110", bg = "#c47b6f" }
count_selected = { fg = "#0f1110", bg = "#e9e4d8" }

border_symbol = "│"
border_style  = { fg = "#353a34" }

syntect_theme = ""

[mode]
normal_main = { fg = "#0f1110", bg = "#fbfaf6", bold = true }
normal_alt  = { fg = "#fbfaf6", bg = "#242925" }

select_main = { fg = "#0f1110", bg = "#e9e4d8", bold = true }
select_alt  = { fg = "#e9e4d8", bg = "#242925" }

unset_main = { fg = "#0f1110", bg = "#8f9688", bold = true }
unset_alt  = { fg = "#8f9688", bg = "#242925" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#242925", bg = "#242925" }

progress_label  = { fg = "#fbfaf6", bold = true }
progress_normal = { fg = "#fbfaf6", bg = "#242925" }
progress_error  = { fg = "#c47b6f", bg = "#242925" }

permissions_t = { fg = "#fbfaf6" }
permissions_r = { fg = "#e9e4d8" }
permissions_w = { fg = "#c47b6f" }
permissions_x = { fg = "#fbfaf6" }
permissions_s = { fg = "#8f9688" }

[input]
border   = { fg = "#fbfaf6" }
title    = {}
value    = {}
selected = { reversed = true }

[completion]
border   = { fg = "#fbfaf6" }
active   = { reversed = true }
inactive = {}

[tasks]
border  = { fg = "#fbfaf6" }
title   = {}
hovered = { underline = true }

[which]
mask         = { bg = "#242925" }
cand         = { fg = "#e9e4d8" }
rest         = { fg = "#8f9688" }
desc         = { fg = "#fbfaf6" }
separator    = "  "
separator_style = { fg = "#353a34" }

[help]
on      = { fg = "#fbfaf6" }
run     = { fg = "#e9e4d8" }
desc    = { fg = "#8f9688" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#0f1110", bg = "#fbfaf6" }

[notify]
title_info  = { fg = "#fbfaf6" }
title_warn  = { fg = "#c47b6f" }
title_error = { fg = "#c47b6f" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[filetype]
rules = [
  { mime = "image/*",   fg = "#fbfaf6" },
  { mime = "video/*",   fg = "#e9e4d8" },
  { mime = "audio/*",   fg = "#c47b6f" },
  { mime = "application/zip",          fg = "#8f9688" },
  { mime = "application/gzip",         fg = "#8f9688" },
  { mime = "application/x-tar",        fg = "#8f9688" },
  { mime = "application/x-bzip",       fg = "#8f9688" },
  { mime = "application/x-bzip2",      fg = "#8f9688" },
  { mime = "application/x-7z-compressed", fg = "#8f9688" },
  { mime = "application/x-rar",        fg = "#8f9688" },
  { mime = "application/pdf",          fg = "#fbfaf6" },
  { name = "*",  fg = "#e9e4d8" },
  { name = "*/", fg = "#fbfaf6", bold = true },
]

[icon]
prepend_rules = [
  { name  = ".git",          text = "" },
  { name  = "Downloads",     text = "" },
  { name  = "Documents",     text = "" },
  { name  = "Pictures",      text = "" },
  { name  = "Music",         text = "" },
  { name  = "Videos",        text = "" },
]
