source = ~/.config/hypr/themes/current.conf

monitor = HDMI-A-3, 1920x1080@75, 0x0, 1
monitor = DP-1, 1920x1080@180, 1920x0, 1

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1
env = XCURSOR_THEME,Nordzy-cursors
env = XCURSOR_SIZE,24

input {
    kb_layout = us
    kb_variant = intl
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    layout = dwindle
    allow_tearing = true
}

decoration {
    rounding = 12
    active_opacity = 0.94
    inactive_opacity = 0.86
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        xray = false
        ignore_opacity = false
        contrast = 1.0
        brightness = 1.0
    }

    shadow {
        enabled = true
        range = 22
        render_power = 4
    }
}

animations {
    enabled = true

    bezier = easeOutQuint, 0.22, 1, 0.36, 1
    bezier = easeInOutCubic, 0.65, 0, 0.35, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0, 0, 1, 1

    animation = windows, 1, 4, overshot, slide
    animation = windowsOut, 1, 3, easeOutQuint, slide
    animation = windowsMove, 1, 4, easeOutQuint
    animation = border, 1, 6, easeOutQuint
    animation = borderangle, 1, 30, linear, loop
    animation = fade, 1, 3, easeOutQuint
    animation = workspaces, 1, 5, easeOutQuint, slide
    animation = layers, 1, 4, easeOutQuint, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
    focus_on_activate = false
    animate_manual_resizes = true
    animate_mouse_windowdragging = false
}

render {
    direct_scanout = 2
}

cursor {
    no_hardware_cursors = true
}

exec-once = swww-daemon
exec-once = ~/.config/hypr/scripts/wallpaper.sh init
exec-once = ~/.config/hypr/scripts/wallpaper-auto.sh
exec-once = waybar
exec-once = swaync
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprctl setcursor Nordzy-cursors 24

$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, E, exec, kitty --class yazi -e yazi
bind = $mod, V, togglefloating
bind = $mod, R, exec, rofi -show drun
bind = $mod, F, fullscreen
bind = $mod, P, pseudo
bind = $mod, B, exec, brave
bind = $mod, T, exec, ~/.config/hypr/scripts/theme-toggle.sh
bind = $mod, G, exec, ~/.config/hypr/scripts/gamemode.sh toggle
bind = $mod, W, exec, ~/.config/hypr/scripts/wallpaper.sh next

bind = $mod SHIFT, L, exec, hyprlock
bind = $mod SHIFT, D, exec, discord
bind = $mod SHIFT, E, exec, wlogout -p layer-shell
bind = $mod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = $mod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mod SHIFT, N, exec, swaync-client -t -sw

bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mod, Print, exec, ~/.config/hypr/scripts/screenshot.sh window

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

bind = $mod CTRL, left, resizeactive, -40 0
bind = $mod CTRL, right, resizeactive, 40 0
bind = $mod CTRL, up, resizeactive, 0 -40
bind = $mod CTRL, down, resizeactive, 0 40

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

windowrule {
    name = steam-games-fullscreen
    match:class = ^(steam_app_.*)$
    immediate = true
    fullscreen = true
    no_blur = true
    no_anim = true
    border_size = 0
    opacity = 1.0 override 1.0 override
}

windowrule {
    name = steam-client
    match:class = ^(steam)$
    no_blur = true
}

windowrule {
    name = steam-main-window-float
    match:class = ^(steam)$
    match:title = ^(Steam)$
    float = true
}

windowrule {
    name = heroic-main-window
    match:class = ^(com.heroicgameslauncher.hgl)$
    no_blur = true
}

windowrule {
    name = heroic-dialogs-float
    match:class = ^(com.heroicgameslauncher.hgl)$
    match:title = negative:(Heroic Games Launcher)
    float = true
    center = true
}

windowrule {
    name = xwayland-fullscreen-immediate
    match:xwayland = true
    match:fullscreen = true
    immediate = true
}

windowrule {
    name = all-fullscreen-no-blur
    match:fullscreen = true
    no_blur = true
    opacity = 1.0 override 1.0 override
}

windowrule {
    name = pavucontrol-floating
    match:class = ^(pavucontrol)$
    float = true
    center = true
    size = 700 450
}

windowrule {
    name = nm-connection-editor-floating
    match:class = ^(nm-connection-editor)$
    float = true
}

windowrule {
    name = blueman-manager-floating
    match:class = ^(blueman-manager)$
    float = true
}

windowrule {
    name = file-dialog-open
    match:title = ^(Open File)$
    float = true
    center = true
}

windowrule {
    name = file-dialog-save
    match:title = ^(Save File)$
    float = true
    center = true
}

windowrule {
    name = rofi-style
    match:class = ^(Rofi|rofi)$
    no_anim = false
    no_blur = false
    float = true
    center = true
}

windowrule {
    name = swaync-no-anim
    match:class = ^(swaync.*)$
    no_anim = true
}

windowrule {
    name = wlogout-fullscreen
    match:class = ^(wlogout)$
    fullscreen = true
}

windowrule {
    name = yazi-float
    match:class = ^(yazi)$
    float = true
    size = 1200 760
    center = true
}

windowrule {
    name = xwayland-empty-class-title-fix
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    no_blur = true
}
