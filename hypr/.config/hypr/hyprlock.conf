source = ~/.config/hypr/themes/current.conf

general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
    no_fade_in = false
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.0117
    contrast = 0.85
    brightness = 0.55
    vibrancy = 0
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba($fg_boldff)
    font_size = 144
    font_family = Maple Mono NF Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba($mutedff)
    font_size = 18
    font_family = Maple Mono NF
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text =   $USER
    color = rgba($fgff)
    font_size = 14
    font_family = Maple Mono NF
    position = 0, -180
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 52
    position = 0, -260
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.42
    dots_center = true
    dots_rounding = -1

    outer_color = rgba($accentff)
    inner_color = rgba($surfacecc)
    font_color = rgba($fg_boldff)
    fade_on_empty = true
    fade_timeout = 800
    placeholder_text = <span foreground="##8a8a8a">unlock</span>
    hide_input = false
    rounding = 12
    check_color = rgba($urgentff)
    fail_color = rgba(d4d4d4ff)
    fail_text = <span foreground="##fafafa">$FAIL</span>
    fail_timeout = 1500
    capslock_color = rgba($urgentff)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    shadow_passes = 0
}

label {
    monitor =
    text = cmd[update:5000] echo "$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1)"
    color = rgba($mutedaa)
    font_size = 11
    font_family = Maple Mono NF
    position = -32, 32
    halign = right
    valign = bottom
}
