# Live profile. Managed by ~/.config/hypr/scripts/settings.sh.

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 1
    allow_tearing = true
}

decoration {
    rounding = 14
    active_opacity = 0.93
    inactive_opacity = 0.84
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 7
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
        noise = 0.018
        contrast = 0.92
        brightness = 1.04
        vibrancy = 0.08
        vibrancy_darkness = 0.05
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        scale = 0.96
    }
}

animations {
    enabled = true
}

misc {
    animate_manual_resizes = true
    animate_mouse_windowdragging = 1
}

cursor {
    no_warps = true
    no_break_fs_vrr = 2
}
