font_family      Maple Mono NF
bold_font        Maple Mono NF Bold
italic_font      Maple Mono NF Italic
bold_italic_font Maple Mono NF Bold Italic
font_size        12.0
font_features    MapleMono-NF +ss01 +ss02 +ss03 +cv01 +cv02

include themes/current.conf

background_opacity 0.94
background_blur 1
dynamic_background_opacity yes

window_padding_width 12
hide_window_decorations yes
confirm_os_window_close 0
remember_window_size no
initial_window_width 1100
initial_window_height 700

cursor_shape beam
cursor_blink_interval 0
cursor_beam_thickness 2
cursor_trail 3
cursor_trail_decay 0.1 0.4

scrollback_lines 10000
mouse_hide_wait 2.0
copy_on_select yes
strip_trailing_spaces smart

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no

sync_to_monitor yes
repaint_delay 4
input_delay 1
wayland_titlebar_color background
linux_display_server wayland

allow_remote_control yes
listen_on unix:/tmp/kitty
shell_integration enabled

tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
tab_title_template "{index} {title}"

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0 change_font_size all 0
